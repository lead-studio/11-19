<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #c471f5, #fa709a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sparkle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 3s linear infinite;
            box-shadow: 0 0 20px #fff, 0 0 40px #fff, 0 0 60px #ff00de;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 
                        inset 0 0 60px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        h1 {
            text-align: center;
            background: linear-gradient(45deg, #ff00cc, #3333ff, #00ccff, #ff00cc);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 5s ease infinite;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 0, 204, 0.5);
            position: relative;
        }

        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        .task-section {
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .task-section::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff00cc, #3333ff, #00ccff);
        }

        .task-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-number {
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            box-shadow: 0 5px 15px rgba(255, 0, 204, 0.4);
        }

        .question {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .question:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .question-text {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
            font-style: italic;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            padding: 15px 20px;
            border: 3px solid transparent;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
            font-weight: 500;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .option-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .option-btn:hover {
            transform: translateX(10px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-color: #38ef7d;
            animation: correctPulse 0.6s ease;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            border-color: #eb3349;
            animation: shake 0.5s ease;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .translation-input {
            width: 100%;
            padding: 15px;
            border: 3px solid #ddd;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .translation-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .check-btn {
            margin-top: 15px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .check-btn::after {
            content: '✨';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            animation: sparkle2 2s infinite;
        }

        @keyframes sparkle2 {
            0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
            50% { opacity: 0.5; transform: translateY(-50%) scale(1.2); }
        }

        .check-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(245, 87, 108, 0.6);
        }

        .check-btn:active {
            transform: translateY(-1px);
        }

        .result-message {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-message.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            display: block;
        }

        .result-message.wrong {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            display: block;
        }

        .score-display {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }

        .final-score {
            text-align: center;
            font-size: 2em;
            margin-top: 30px;
            padding: 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 20px;
            display: none;
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.4);
        }

        .final-score.show {
            display: block;
            animation: bounceIn 0.8s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .russian-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 10px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .container { padding: 20px; }
            .score-display { 
                position: relative; 
                top: 0; 
                right: 0; 
                margin-bottom: 20px;
                text-align: center;
            }
        }
    </style>
</head>

                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${q.definition}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <button class="option-btn" onclick="checkAnswer1(${index}, '${opt.replace(/'/g, "\\'")}', this)">
                                ${String.fromCharCode(65 + i)}. ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div class="result-message" id="result1-${index}"></div>
                `;
                container.appendChild(questionDiv);
            });
            document.getElementById('total').textContent = task1Questions.length + task2Questions.length;
        }

        function checkAnswer1(questionIndex, selectedAnswer, btnElement) {
            if (answeredQuestions.has(`1-${questionIndex}`)) return;
            
            const question = task1Questions[questionIndex];
            const resultDiv = document.getElementById(`result1-${questionIndex}`);
            const buttons = btnElement.parentElement.querySelectorAll('.option-btn');
            
            answeredQuestions.add(`1-${questionIndex}`);
            
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.style.cursor = 'not-allowed';
                if (btn.textContent.includes(question.correct)) {
                    btn.classList.add('correct');
                }
            });
            
            if (selectedAnswer === question.correct) {
                score++;
                document.getElementById('score').textContent = score;
                resultDiv.textContent = '✅ Correct! Well done!';
                resultDiv.className = 'result-message correct';
            } else {
                btnElement.classList.add('wrong');
                resultDiv.textContent = `❌ Wrong! The correct answer is: ${question.correct}`;
                resultDiv.className = 'result-message wrong';
            }
            
            checkCompletion();
        }

        // Initialize Task 2
        function initTask2() {
            const container = document.getElementById('task2-questions');
            task2Questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. Translate:</div>
                    <div class="russian-text">${q.russian}</div>
                    <input type="text" class="translation-input" id="input2-${index}" placeholder="Enter the English idiom...">
                    <button class="check-btn" onclick="checkAnswer2(${index}, '${q.answer.replace(/'/g, "\\'")}')">
                        Check Answer
                    </button>
                    <div class="result-message" id="result2-${index}"></div>
                `;
                container.appendChild(questionDiv);
            });
        }

        function checkAnswer2(questionIndex, correctAnswer) {
            if (answeredQuestions.has(`2-${questionIndex}`)) return;
            
            const input = document.getElementById(`input2-${questionIndex}`);
            const userAnswer = input.value.trim().toLowerCase();
            const resultDiv = document.getElementById(`result2-${questionIndex}`);
            
            answeredQuestions.add(`2-${questionIndex}`);
            
            input.disabled = true;
            input.parentElement.querySelector('.check-btn').disabled = true;
            
            if (userAnswer === correctAnswer.toLowerCase()) {
                score++;
                document.getElementById('score').textContent = score;
                resultDiv.textContent = `✅ Correct! The answer is: ${correctAnswer}`;
                resultDiv.className = 'result-message correct';
                input.style.borderColor = '#38ef7d';
            } else {
                resultDiv.textContent = `❌ Wrong! The correct answer is: ${correctAnswer}`;
                resultDiv.className = 'result-message wrong';
                input.style.borderColor = '#eb3349';
            }
            
            checkCompletion();
        }

        function checkCompletion() {
            if (answeredQuestions.size === task1Questions.length + task2Questions.length) {
                setTimeout(() => {
                    const finalScoreDiv = document.getElementById('finalScore');
                    const percentage = Math.round((score / (task1Questions.length + task2Questions.length)) * 100);
                    let message = '';
                    
                    if (percentage >= 90) message = '🌟 Outstanding! You\'re an idiom master!';
                    else if (percentage >= 70) message = '👏 Great job! Keep up the good work!';
                    else if (percentage >= 50) message = '👍 Good effort! Keep practicing!';
                    else message = '📚 Keep studying! You\'ll get better!';
                    
                    finalScoreDiv.innerHTML = `
                        <div style="font-size: 0.8em; margin-bottom: 10px;">Your Final Score</div>
                        <div style="font-size: 1.5em; margin-bottom: 10px;">${score} / ${task1Questions.length + task2Questions.length}</div>
                        <div style="font-size: 0.7em;">${percentage}%</div>
                        <div style="margin-top: 20px; font-size: 0.6em;">${message}</div>
                    `;
                    finalScoreDiv.classList.add('show');
                    
                    createCelebration();
                }, 1000);
            }
        }

        function createCelebration() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.left = Math.random() * 100 + 'vw';
                    sparkle.style.top = Math.random() * 100 + 'vh';
                    sparkle.style.animationDelay = Math.random() * 2 + 's';
                    document.body.appendChild(sparkle);
                    
                    setTimeout(() => sparkle.remove(), 3000);
                }, i * 50);
            }
        }

        function createBackgroundSparkles() {
            setInterval(() => {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.top = Math.random() * 100 + 'vh';
                sparkle.style.width = Math.random() * 10 + 5 + 'px';
                sparkle.style.height = sparkle.style.width;
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 3000);
            }, 500);
        }

        window.onload = function() {
            initTask1();
            initTask2();
            createBackgroundSparkles();
        };
    </script>
</body>
</html>
