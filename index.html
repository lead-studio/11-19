<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idioms Unit 11-19</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #c471f5, #fa709a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sparkle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 3s linear infinite;
            box-shadow: 0 0 20px #fff, 0 0 40px #fff, 0 0 60px #ff00de;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), inset 0 0 60px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        h1 {
            text-align: center;
            background: linear-gradient(45deg, #ff00cc, #3333ff, #00ccff, #ff00cc);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 5s ease infinite;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 0, 204, 0.5);
            position: relative;
        }

        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        /* Progress Bar */
        .progress-container {
            margin-bottom: 30px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .progress-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f260, #0575e6, #00f260);
            background-size: 200% 100%;
            animation: progressGlow 2s linear infinite;
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        @keyframes progressGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .task-section {
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .task-section::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff00cc, #3333ff, #00ccff);
        }

        .task-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-number {
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            box-shadow: 0 5px 15px rgba(255, 0, 204, 0.4);
        }

        .question {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .question:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .question-text {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
            font-style: italic;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            padding: 15px 20px;
            border: 3px solid transparent;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
            font-weight: 500;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .option-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .option-btn:hover {
            transform: translateX(10px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-color: #38ef7d;
            animation: correctPulse 0.6s ease;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            border-color: #eb3349;
            animation: shake 0.5s ease;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .result-message {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-message.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            display: block;
        }

        .result-message.wrong {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            display: block;
        }

        .score-display {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }

        .final-score {
            text-align: center;
            font-size: 2em;
            margin-top: 30px;
            padding: 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 20px;
            display: none;
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.4);
        }

        .final-score.show {
            display: block;
            animation: bounceIn 0.8s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .restart-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .container { padding: 20px; }
            .score-display { 
                position: relative; 
                top: 0; 
                right: 0; 
                margin-bottom: 20px;
                text-align: center;
            }
        }
    </style>
</head>

            { definition: "as part of a normal process", correct: "as a matter of course", wrong: ["unusually", "rarely"] },
            { definition: "for two weeks/three years without stopping", correct: "running", wrong: ["occasionally", "with breaks"] },
            { definition: "INF improve; make progress", correct: "come on", wrong: ["get worse", "stay the same"] },
            { definition: "very quickly and by a large amount", correct: "in leaps and bounds", wrong: ["slowly", "gradually"] },
            { definition: "in a short period of time", correct: "in a short space of time", wrong: ["over many years", "slowly"] },
            { definition: "stop making an effort because you have already achieved sth", correct: "rest on your laurels", wrong: ["keep trying", "aim higher"] },
            { definition: "INF be doing well and being successful", correct: "be going strong", wrong: ["be failing", "struggle"] },

            // MOVEMENT & TRANSPORT
            { definition: "prevent sb/sth from moving by getting in the way", correct: "block in", wrong: ["help move", "clear the way"] },
            { definition: "move into a line of traffic in front of another vehicle", correct: "cut in", wrong: ["stay behind", "wait your turn"] },
            { definition: "signal to a vehicle or driver to stop", correct: "flag down", wrong: ["ignore", "speed past"] },
            { definition: "move a vehicle to the side of the road and stop", correct: "pull over", wrong: ["speed up", "continue driving"] },
            { definition: "travel from one place to another", correct: "get from A to B", wrong: ["stay in one place", "get lost"] },
            { definition: "in a straight line between two places", correct: "as the crow flies", wrong: ["by the longest route", "with many stops"] },
            { definition: "INF be extremely difficult or unpleasant", correct: "be murder", wrong: ["be easy", "be pleasant"] },
            { definition: "take sb in a vehicle to a place and leave them there", correct: "drop off", wrong: ["pick up", "take with you"] },
            { definition: "allow very little time to do sth", correct: "cut it fine", wrong: ["allow plenty of time", "be early"] },
            { definition: "very slowly", correct: "at a snail's pace", wrong: ["very fast", "quickly"] },
            { definition: "INF in the countryside, a long way from a town", correct: "miles from anywhere", wrong: ["in the city center", "easily accessible"] },

            // GENERAL
            { definition: "cause sb to be in a difficult or unpleasant situation", correct: "land sb in", wrong: ["help sb out", "save sb"] },
            { definition: "be too careful rather than take risks", correct: "err on the side of caution", wrong: ["take risks", "be reckless"] },
            { definition: "continue to have or keep sth", correct: "hold on to", wrong: ["let go", "lose"] },
            { definition: "include sth as an extra part of sth", correct: "add on", wrong: ["remove", "subtract"] },
            { definition: "finally reach a particular state or total", correct: "come to", wrong: ["start from", "avoid"] },
            { definition: "knowing all the facts and dangers", correct: "with your eyes open", wrong: ["unaware", "ignorant"] },
            { definition: "make sb lose interest or enthusiasm for sth", correct: "put sb off", wrong: ["encourage", "motivate"] },
            { definition: "almost; nearly", correct: "pretty much", wrong: ["not at all", "completely different"] },
            { definition: "very poor; with very little money to live on", correct: "on the breadline", wrong: ["wealthy", "comfortable"] },
            { definition: "INF have more money than good sense about how to spend it", correct: "have more money than sense", wrong: ["be wise with money", "be frugal"] },
            { definition: "live an exciting life, taking risks and doing a lot of things", correct: "live life in the fast lane", wrong: ["live quietly", "avoid risks"] },
            { definition: "not think that sth is important or surprising", correct: "think nothing of", wrong: ["be shocked by", "consider important"] },
            { definition: "go to a place, especially for the first time", correct: "set foot in/on", wrong: ["avoid", "leave"] },
            { definition: "become involved in sth, often without wanting to", correct: "be caught up in", wrong: ["stay out of", "avoid"] },
            { definition: "by people telling other people, rather than by being officially announced", correct: "by word of mouth", wrong: ["officially", "in writing"] },
            { definition: "burn sth so much that it becomes black and hard", correct: "burn to a crisp", wrong: ["cook perfectly", "undercook"] },
            { definition: "thinking about a past event or situation, especially with the advantage of knowing more now", correct: "in retrospect", wrong: ["looking forward", "in the moment"] },
            { definition: "stay slightly ahead of a competitor or enemy", correct: "keep one step ahead", wrong: ["fall behind", "be equal"] },
            { definition: "INF fail to take advantage of an opportunity", correct: "miss the boat", wrong: ["seize the opportunity", "succeed"] },
            { definition: "fool yourself into believing sth that is not true", correct: "delude yourself", wrong: ["be honest", "face reality"] },
            { definition: "make a product available in such large quantities that the price falls", correct: "flood the market", wrong: ["create shortage", "raise prices"] },
            { definition: "INF be in a difficult or dangerous situation", correct: "be in deep water", wrong: ["be safe", "be comfortable"] },
            { definition: "having too many people in positions of authority compared with ordinary workers", correct: "top-heavy", wrong: ["well-balanced", "efficient"] },
            { definition: "encourage two people or groups to compete or fight against each other", correct: "play off against", wrong: ["unite", "reconcile"] },
            { definition: "be in the right situation at the right time to achieve sth", correct: "be in the right place at the right time", wrong: ["be unlucky", "miss opportunities"] },
            { definition: "INF a great success", correct: "a roaring success", wrong: ["a failure", "mediocre"] }
        ];

        // Fisher-Yates shuffle
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        let score = 0;
        let answeredCount = 0;
        let answeredQuestions = new Set();
        let shuffledQuestions = [];

        // Initialize Quiz
        function initQuiz() {
            // Shuffle all questions
            shuffledQuestions = shuffleArray(allIdioms);
            
            const container = document.getElementById('task1-questions');
            container.innerHTML = '';
            
            shuffledQuestions.forEach((q, index) => {
                // Shuffle options: correct + 2 wrong
                const options = shuffleArray([q.correct, ...q.wrong]);
                
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                questionDiv.id = `question-${index}`;
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${q.definition}</div>
                    <div class="options">
                        ${options.map((opt, i) => `
                            <button class="option-btn" onclick="checkAnswer(${index}, '${opt.replace(/'/g, "\\'")}', this)">
                                ${String.fromCharCode(65 + i)}. ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div class="result-message" id="result-${index}"></div>
                `;
                container.appendChild(questionDiv);
            });
            
            document.getElementById('total').textContent = shuffledQuestions.length;
            document.getElementById('total-questions').textContent = shuffledQuestions.length;
            updateProgress();
        }

        function checkAnswer(questionIndex, selectedAnswer, btnElement) {
            if (answeredQuestions.has(questionIndex)) return;
            
            const question = shuffledQuestions[questionIndex];
            const resultDiv = document.getElementById(`result-${questionIndex}`);
            const buttons = btnElement.parentElement.querySelectorAll('.option-btn');
            
            answeredQuestions.add(questionIndex);
            answeredCount++;
            
            // Disable all buttons and highlight correct one
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.style.cursor = 'not-allowed';
                if (btn.textContent.includes(question.correct)) {
                    btn.classList.add('correct');
                }
            });
            
            // Check answer
            if (selectedAnswer === question.correct) {
                score++;
                document.getElementById('score').textContent = score;
                resultDiv.textContent = '✅ Correct! Well done!';
                resultDiv.className = 'result-message correct';
            } else {
                btnElement.classList.add('wrong');
                resultDiv.textContent = `❌ Wrong! The correct answer is: ${question.correct}`;
                resultDiv.className = 'result-message wrong';
            }
            
            updateProgress();
            checkCompletion();
        }

        function updateProgress() {
            const percentage = (answeredCount / shuffledQuestions.length) * 100;
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-text').innerHTML = 
                `${answeredCount} / ${shuffledQuestions.length}`;
        }

        function checkCompletion() {
            if (answeredCount === shuffledQuestions.length) {
                setTimeout(() => {
                    const finalScoreDiv = document.getElementById('finalScore');
                    const percentage = Math.round((score / shuffledQuestions.length) * 100);
                    let message = '';
                    
                    if (percentage >= 90) message = '🌟 Outstanding! You\'re an idiom master!';
                    else if (percentage >= 70) message = '👏 Great job! Keep up the good work!';
                    else if (percentage >= 50) message = '👍 Good effort! Keep practicing!';
                    else message = '📚 Keep studying! You\'ll get better!';
                    
                    finalScoreDiv.innerHTML = `
                        <div style="font-size: 0.8em; margin-bottom: 10px;">✨ Your Final Score ✨</div>
                        <div style="font-size: 1.5em; margin-bottom: 10px;">${score} / ${shuffledQuestions.length}</div>
                        <div style="font-size: 0.7em;">${percentage}%</div>
                        <div style="margin-top: 20px; font-size: 0.6em;">${message}</div>
                        <button class="restart-btn" onclick="restartQuiz()">🔄 Try Again</button>
                    `;
                    finalScoreDiv.classList.add('show');
                    createCelebration();
                }, 1000);
            }
        }

        function restartQuiz() {
            score = 0;
            answeredCount = 0;
            answeredQuestions.clear();
            document.getElementById('score').textContent = '0';
            document.getElementById('finalScore').classList.remove('show');
            document.getElementById('progress-fill').style.width = '0%';
            initQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function createCelebration() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.left = Math.random() * 100 + 'vw';
                    sparkle.style.top = Math.random() * 100 + 'vh';
                    sparkle.style.animationDelay = Math.random() * 2 + 's';
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 3000);
                }, i * 50);
            }
        }

        function createBackgroundSparkles() {
            setInterval(() => {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.top = Math.random() * 100 + 'vh';
                sparkle.style.width = Math.random() * 10 + 5 + 'px';
                sparkle.style.height = sparkle.style.width;
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 3000);
            }, 500);
        }

        window.onload = function() {
            initQuiz();
            createBackgroundSparkles();
        };
    </script>
