<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Idioms Master</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bc13fe;
            --neon-green: #0aff00;
            --bg-dark: #050510;
            --card-bg: rgba(20, 20, 40, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(188, 19, 254, 0.2) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 243, 255, 0.2) 0%, transparent 20%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--neon-blue);
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s linear infinite;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border: 2px solid var(--neon-purple);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.3);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 20px;
            color: white;
            text-shadow: 
                0 0 5px var(--neon-pink),
                0 0 10px var(--neon-pink),
                0 0 20px var(--neon-purple);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px var(--neon-pink), 0 0 10px var(--neon-pink); }
            to { text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue); }
        }

        /* Menu Styles */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .stage-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-blue);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stage-card:hover {
            background: rgba(0, 243, 255, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .stage-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: var(--neon-blue);
        }

        .stage-desc {
            font-size: 0.9em;
            color: #aaa;
        }

        .block-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .block-btn {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .block-btn:hover, .block-btn.active {
            background: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
        }

        /* Game Area */
        .game-area {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            width: 0%;
            transition: width 0.5s;
        }

        .question-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .definition {
            font-size: 1.3em;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #fff;
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-blue);
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover {
            background: rgba(0, 243, 255, 0.1);
        }

        .option-btn.correct {
            background: var(--neon-green);
            border-color: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .option-btn.wrong {
            background: var(--neon-pink);
            border-color: var(--neon-pink);
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .feedback {
            text-align: center;
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
            min-height: 30px;
        }

        .feedback.try-again { color: var(--neon-pink); }
        .feedback.success { color: var(--neon-green); }

        /* Stage 2 Specific */
        .translation-card {
            text-align: center;
        }

        .russian-text {
            font-size: 1.5em;
            color: var(--neon-pink);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .answer-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            border: 1px solid var(--neon-green);
        }

        .answer-text {
            font-size: 1.4em;
            color: var(--neon-green);
        }

        .action-btn {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.5);
            transition: transform 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Background Particles -->
    <div id="particles"></div>

    <div class="container">
        <button class="back-btn hidden" onclick="goHome()">← Menu</button>
        
        <!-- Main Menu -->
        <div id="main-menu">
            <h1>NEON IDIOMS</h1>
            <p style="text-align: center; color: #aaa;">Select your challenge</p>
            
            <div class="menu-grid">
                <div class="stage-card" onclick="selectStage(1)">
                    <div class="stage-title">STAGE 1</div>
                    <div class="stage-desc">Multiple Choice Quiz<br>Definition → Idiom</div>
                </div>
                <div class="stage-card" onclick="selectStage(2)">
                    <div class="stage-title">STAGE 2</div>
                    <div class="stage-desc">Translation Check<br>Russian → English</div>
                </div>
            </div>

            <div id="block-selection" class="hidden">
                <h3 style="text-align: center; margin-top: 30px; color: var(--neon-blue);">Select Block</h3>
                <div class="block-selector" id="block-buttons">
                    <!-- Buttons generated by JS -->
                </div>
            </div>
        </div>

        <!-- Game Area -->
        <div id="game-area" class="game-area">
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>

            <div id="stage-1-content" class="hidden">
                <div class="question-card">
                    <div class="definition" id="q-definition"></div>
                    <div class="options-grid" id="q-options"></div>
                    <div class="feedback" id="q-feedback"></div>
                </div>
                <button class="action-btn hidden" id="next-btn" onclick="nextQuestion()">Next →</button>
            </div>

            <div id="stage-2-content" class="hidden translation-card">
                <div class="question-card">
                    <div class="russian-text" id="s2-russian"></div>
                    <button class="action-btn" onclick="checkTranslation()">Check Answer</button>
                    <div class="answer-box" id="s2-answer">
                        <div class="answer-text" id="s2-english"></div>
                    </div>
                </div>
                <button class="action-btn hidden" id="s2-next-btn" onclick="nextQuestion()">Next →</button>
            </div>

            <div id="completion-screen" class="hidden" style="text-align: center;">
                <h2 style="color: var(--neon-green); font-size: 2em; margin-bottom: 20px;">Block Complete! 🎉</h2>
                <p style="margin-bottom: 30px;">Great job! Ready for the next challenge?</p>
                <button class="action-btn" onclick="goHome()">Back to Menu</button>
            </div>
        </div>
    </div>

        // Fisher-Yates shuffle function
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Game State
        let currentStage = 0;
        let currentBlock = 0;
        let currentBlockData = [];
        let currentIndex = 0;
        let isStage1 = true;

        // Initialize
        function init() {
            createParticles();
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for(let i=0; i<20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(p);
            }
        }

        // Navigation
        function selectStage(stage) {
            currentStage = stage;
            isStage1 = (stage === 1);
            
            document.getElementById('main-menu').querySelector('.menu-grid').classList.add('hidden');
            document.getElementById('block-selection').classList.remove('hidden');
            
            const blockContainer = document.getElementById('block-buttons');
            blockContainer.innerHTML = '';
            
            // Create 4 blocks
            for(let i=1; i<=4; i++) {
                const btn = document.createElement('button');
                btn.className = 'block-btn';
                btn.textContent = `Block ${i}`;
                btn.onclick = () => startBlock(i, btn);
                blockContainer.appendChild(btn);
            }
        }

        function startBlock(blockNum, btnElement) {
            // Highlight selected block
            document.querySelectorAll('.block-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            
            currentBlock = blockNum;
            
            // Slice data into blocks (40 items each)
            const start = (blockNum - 1) * 40;
            const end = start + 40;
            
            // SHUFFLE the block data so order is random each time!
            currentBlockData = shuffleArray(allIdioms.slice(start, end));
            
            // If last block has fewer items, adjust
            if(currentBlockData.length === 0) {
                alert("This block is empty!");
                return;
            }

            // Switch to game area
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-area').style.display = 'block';
            document.querySelector('.back-btn').classList.remove('hidden');
            
            // Setup UI based on stage
            if(isStage1) {
                document.getElementById('stage-1-content').classList.remove('hidden');
                document.getElementById('stage-2-content').classList.add('hidden');
            } else {
                document.getElementById('stage-1-content').classList.add('hidden');
                document.getElementById('stage-2-content').classList.remove('hidden');
            }
            
            currentIndex = 0;
            loadQuestion();
        }

        function goHome() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('main-menu').querySelector('.menu-grid').classList.remove('hidden');
            document.getElementById('block-selection').classList.add('hidden');
            document.querySelector('.back-btn').classList.add('hidden');
            document.getElementById('completion-screen').classList.add('hidden');
        }

        // Game Logic
        function loadQuestion() {
            if(currentIndex >= currentBlockData.length) {
                showCompletion();
                return;
            }

            const item = currentBlockData[currentIndex];
            const progress = ((currentIndex) / currentBlockData.length) * 100;
            document.getElementById('progress').style.width = progress + '%';

            if(isStage1) {
                // Stage 1: Multiple Choice
                document.getElementById('q-definition').textContent = item.def;
                document.getElementById('q-feedback').textContent = '';
                document.getElementById('q-feedback').className = 'feedback';
                document.getElementById('next-btn').classList.add('hidden');
                
                // Generate options (1 correct + 2 random wrong)
                const wrongOptions = allIdioms
                    .filter(i => i.en !== item.en)
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 2)
                    .map(i => i.en);
                
                const options = [item.en, ...wrongOptions].sort(() => 0.5 - Math.random());
                
                const optionsContainer = document.getElementById('q-options');
                optionsContainer.innerHTML = '';
                
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.onclick = () => checkAnswer(opt, item.en, btn);
                    optionsContainer.appendChild(btn);
                });

            } else {
                // Stage 2: Translation Check
                document.getElementById('s2-russian').textContent = item.ru;
                document.getElementById('s2-english').textContent = item.en;
                document.getElementById('s2-answer').style.display = 'none';
                document.getElementById('s2-next-btn').classList.add('hidden');
            }
        }

        function checkAnswer(selected, correct, btnElement) {
            if(selected === correct) {
                // Correct
                btnElement.classList.add('correct');
                document.getElementById('q-feedback').textContent = 'Correct!';
                document.getElementById('q-feedback').classList.add('success');
                
                // Disable all buttons
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(b => b.disabled = true);
                
                document.getElementById('next-btn').classList.remove('hidden');
            } else {
                // Wrong
                btnElement.classList.add('wrong');
                document.getElementById('q-feedback').textContent = 'Try again';
                document.getElementById('q-feedback').classList.add('try-again');
                
                // Remove wrong class after animation
                setTimeout(() => {
                    btnElement.classList.remove('wrong');
                }, 500);
            }
        }

        function checkTranslation() {
            document.getElementById('s2-answer').style.display = 'block';
            document.getElementById('s2-next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            loadQuestion();
        }

        function showCompletion() {
            document.getElementById('stage-1-content').classList.add('hidden');
            document.getElementById('stage-2-content').classList.add('hidden');
            document.getElementById('completion-screen').classList.remove('hidden');
            document.getElementById('progress').style.width = '100%';
        }

        // Start
        init();

    </script>
